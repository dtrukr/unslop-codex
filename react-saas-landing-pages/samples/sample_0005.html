<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizSprout — Create classroom quizzes in minutes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --ink: #22304a;
      --muted: #5d6b84;
      --peach: #fff1d9;
      --mint: #dff8ec;
      --sky: #dff1ff;
      --berry: #ff6b8b;
      --sun: #ffbf47;
      --leaf: #3fc38a;
      --ocean: #54a9ff;
      --paper: #fffdf8;
      --card: rgba(255,255,255,0.82);
      --shadow: 0 18px 50px rgba(38, 60, 101, 0.12);
      --radius: 28px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Nunito", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, #fff7d8 0, transparent 30%),
        radial-gradient(circle at top right, #e5f6ff 0, transparent 32%),
        linear-gradient(180deg, #fffdf8 0%, #fff8ef 100%);
    }

    a { color: inherit; text-decoration: none; }
    .app { overflow: hidden; }
    .container { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }

    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 0;
    }

    .brand {
      display: flex; align-items: center; gap: 12px;
      font-family: "Baloo 2", cursive; font-size: 1.65rem; letter-spacing: 0.2px;
    }

    .brand-badge {
      width: 46px; height: 46px; border-radius: 16px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, #ffcb52, #ff8a67);
      color: white; box-shadow: var(--shadow);
      transform: rotate(-8deg);
      font-size: 1.3rem;
    }

    .nav-links {
      display: flex; align-items: center; gap: 18px;
      color: var(--muted); font-weight: 700;
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 10px; border: 0; cursor: pointer; font: inherit; font-weight: 800;
      padding: 14px 22px; border-radius: 999px; transition: .2s ease;
    }

    .btn:hover { transform: translateY(-2px); }
    .btn-primary {
      background: linear-gradient(135deg, var(--berry), #ff9470);
      color: white; box-shadow: 0 16px 30px rgba(255, 107, 139, 0.28);
    }

    .btn-secondary {
      background: white; color: var(--ink); box-shadow: var(--shadow);
    }

    .hero {
      display: grid; grid-template-columns: 1.08fr .92fr; gap: 38px;
      align-items: center; padding: 28px 0 46px;
    }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      background: #fff; border-radius: 999px; padding: 10px 14px;
      box-shadow: var(--shadow); color: #ff7b54; font-weight: 800;
      margin-bottom: 18px;
    }

    h1, h2, h3 {
      margin: 0;
      font-family: "Baloo 2", cursive;
      line-height: 0.95;
    }

    h1 { font-size: clamp(3rem, 7vw, 5.4rem); }
    h2 { font-size: clamp(2rem, 4.2vw, 3.2rem); }
    h3 { font-size: 1.55rem; line-height: 1.05; }

    .lead {
      font-size: 1.12rem; line-height: 1.7; color: var(--muted);
      max-width: 560px; margin: 18px 0 26px;
    }

    .hero-actions { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 18px; }
    .mini-note { color: var(--muted); font-weight: 700; }

    .hero-visual {
      position: relative; min-height: 510px;
      display: flex; align-items: center; justify-content: center;
    }

    .bubble {
      position: absolute; border-radius: 999px; opacity: .95;
      animation: float 6s ease-in-out infinite;
    }
    .bubble.one { width: 78px; height: 78px; background: #ffd460; top: 28px; left: 26px; }
    .bubble.two { width: 54px; height: 54px; background: #92e0ff; right: 34px; top: 90px; animation-delay: -2s; }
    .bubble.three { width: 66px; height: 66px; background: #a0efbf; bottom: 60px; right: 18px; animation-delay: -1s; }

    .board {
      width: 100%; max-width: 500px; background: linear-gradient(180deg, #ffffff, #fff9f3);
      border-radius: 34px; padding: 22px; box-shadow: var(--shadow); position: relative;
      border: 1px solid rgba(255,255,255,0.75);
    }

    .board-top {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px;
    }

    .pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 999px; font-weight: 800; font-size: .92rem;
    }

    .pill.sun { background: #fff1c7; color: #9b6800; }
    .pill.mint { background: #dcf8ea; color: #167a52; }

    .quiz-card {
      background: linear-gradient(135deg, #f0f8ff, #fef6ff);
      border-radius: 26px; padding: 18px; margin-bottom: 16px;
    }

    .lines { display: grid; gap: 10px; margin-top: 14px; }
    .line {
      height: 14px; border-radius: 999px;
      background: linear-gradient(90deg, #d7e7ff, #eef5ff);
    }
    .line.short { width: 58%; }
    .line.mid { width: 76%; }

    .choices {
      display: grid; gap: 10px; margin-top: 14px;
    }
    .choice {
      background: white; border-radius: 18px; padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 10px 22px rgba(64, 106, 176, 0.08);
      color: var(--muted); font-weight: 700;
    }
    .dot { width: 14px; height: 14px; border-radius: 50%; }
    .dot.pink { background: #ff8fb3; }
    .dot.blue { background: #75c2ff; }
    .dot.green { background: #77d99f; }

    .empty-state {
      background: linear-gradient(135deg, #fff3d9, #ffe7ee);
      border-radius: 26px; padding: 18px;
      display: grid; grid-template-columns: 102px 1fr; gap: 14px; align-items: center;
    }

    .illustration {
      width: 102px; height: 102px; border-radius: 24px;
      background: rgba(255,255,255,0.7); display: grid; place-items: center;
      position: relative; overflow: hidden;
    }

    .spark, .paper, .star {
      position: absolute; border-radius: 12px;
    }
    .paper {
      width: 48px; height: 60px; background: white; top: 20px; left: 28px;
      border-radius: 14px; box-shadow: 0 10px 20px rgba(76, 76, 128, 0.1);
    }
    .paper:before, .paper:after {
      content: ""; position: absolute; left: 9px; right: 9px; height: 7px;
      border-radius: 99px; background: #d9e7ff;
    }
    .paper:before { top: 14px; }
    .paper:after { top: 28px; }
    .spark { width: 16px; height: 16px; background: #ffd056; top: 16px; right: 15px; transform: rotate(22deg); }
    .star {
      width: 13px; height: 13px; background: #98e7b5; bottom: 16px; left: 16px;
      border-radius: 4px; transform: rotate(35deg);
    }

    .stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
      margin-top: 18px;
    }

    .stat {
      background: var(--card); backdrop-filter: blur(10px);
      padding: 16px; border-radius: 22px; box-shadow: var(--shadow);
    }

    .stat strong {
      display: block; font-size: 1.6rem; font-family: "Baloo 2", cursive; line-height: 1;
    }

    .section {
      padding: 58px 0;
      position: relative;
    }

    .section-bg {
      border-radius: 40px; padding: 34px;
      box-shadow: var(--shadow);
    }
    .bg-mint { background: linear-gradient(135deg, #e8fff3, #effffb); }
    .bg-sky { background: linear-gradient(135deg, #eef8ff, #f7f2ff); }
    .bg-peach { background: linear-gradient(135deg, #fff5df, #fff1f7); }

    .section-head {
      display: flex; justify-content: space-between; gap: 24px; align-items: end;
      margin-bottom: 24px;
    }

    .subtle {
      color: var(--muted); line-height: 1.7; max-width: 540px;
    }

    .grid-3 {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;
    }

    .feature {
      background: rgba(255,255,255,0.82); border-radius: 26px; padding: 22px;
      min-height: 220px; box-shadow: 0 10px 30px rgba(50, 77, 118, 0.08);
    }

    .feature-icon {
      width: 56px; height: 56px; border-radius: 18px; display: grid; place-items: center;
      font-size: 1.4rem; margin-bottom: 14px;
    }

    .feature p, .empty-copy, .testimonial p, .cta p { color: var(--muted); line-height: 1.7; }

    .workflow {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;
    }

    .step {
      background: white; border-radius: 28px; padding: 22px; position: relative;
      box-shadow: var(--shadow);
    }

    .step-num {
      width: 40px; height: 40px; border-radius: 14px; display: grid; place-items: center;
      font-weight: 900; margin-bottom: 14px;
    }

    .tiny-illustration {
      height: 110px; border-radius: 22px; margin-top: 14px; position: relative; overflow: hidden;
      background: linear-gradient(180deg, #fff, #fdf9f0);
    }

    .mini-card, .mini-badge, .mini-circle {
      position: absolute; border-radius: 18px;
    }

    .mini-card { background: white; box-shadow: 0 12px 20px rgba(65, 86, 122, 0.1); }
    .mini-badge { border-radius: 999px; }
    .mini-circle { border-radius: 50%; }

    .testimonials {
      display: grid; grid-template-columns: 1.2fr .8fr; gap: 18px;
      align-items: stretch;
    }

    .testimonial, .quote-card, .cta {
      background: rgba(255,255,255,0.84); border-radius: 30px; padding: 24px;
      box-shadow: var(--shadow);
    }

    .avatar-row {
      display: flex; align-items: center; gap: 12px; margin-top: 16px;
      font-weight: 800;
    }

    .avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, #ffbe6a, #ff7d93);
      display: grid; place-items: center; color: white; font-weight: 900;
    }

    .quote-card {
      background: linear-gradient(135deg, #fff7dc, #eefaff);
      display: flex; flex-direction: column; justify-content: space-between;
    }

    .cta {
      text-align: center;
      background: linear-gradient(135deg, #22304a, #304669);
      color: white;
    }

    .cta p { color: rgba(255,255,255,0.8); max-width: 560px; margin: 14px auto 24px; }

    .footer {
      padding: 22px 0 40px; color: var(--muted); font-weight: 700;
      display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @media (max-width: 920px) {
      .hero, .grid-3, .workflow, .testimonials { grid-template-columns: 1fr; }
      .section-head, .footer, .nav { align-items: flex-start; }
      .stats { grid-template-columns: 1fr; }
      .nav-links a:not(.btn) { display: none; }
    }

    @media (max-width: 640px) {
      h1 { line-height: 0.98; }
      .section-bg, .board, .feature, .step, .testimonial, .quote-card, .cta { border-radius: 24px; }
      .empty-state { grid-template-columns: 1fr; }
      .hero-visual { min-height: auto; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const FeatureCard = ({ icon, color, title, text }) => (
      <div className="feature">
        <div className="feature-icon" style={{ background: color }}>{icon}</div>
        <h3>{title}</h3>
        <p>{text}</p>
      </div>
    );

    const StepCard = ({ num, color, title, text, illustration }) => (
      <div className="step">
        <div className="step-num" style={{ background: color }}>{num}</div>
        <h3>{title}</h3>
        <p className="subtle">{text}</p>
        <div className="tiny-illustration">{illustration}</div>
      </div>
    );

    const App = () => (
      <div className="app">
        <div className="container">
          <nav className="nav">
            <div className="brand">
              <div className="brand-badge">✦</div>
              <span>QuizSprout</span>
            </div>
            <div className="nav-links">
              <a href="#features">Features</a>
              <a href="#how">How it works</a>
              <a href="#teachers">Teachers</a>
              <a href="#start" className="btn btn-primary">Start free</a>
            </div>
          </nav>

          <section className="hero">
            <div>
              <div className="eyebrow">🌼 Friendly quiz-making for busy classrooms</div>
              <h1>Create quizzes faster, teach with less fuss.</h1>
              <p className="lead">
                QuizSprout helps teachers turn lessons, notes, and worksheets into ready-to-share quizzes in minutes.
                Friendly prompts, cheerful templates, and zero spreadsheet energy required.
              </p>
              <div className="hero-actions">
                <a href="#start" className="btn btn-primary">Try QuizSprout</a>
                <a href="#features" className="btn btn-secondary">See a sample</a>
              </div>
              <div className="mini-note">Used for quick bell-ringers, exit tickets, homework checks, and review games.</div>
              <div className="stats">
                <div className="stat">
                  <strong>12 min</strong>
                  Average time saved per quiz
                </div>
                <div className="stat">
                  <strong>4 clicks</strong>
                  From topic idea to finished draft
                </div>
                <div className="stat">
                  <strong>Kid-friendly</strong>
                  Clear wording and colorful layouts
                </div>
              </div>
            </div>

            <div className="hero-visual">
              <div className="bubble one"></div>
              <div className="bubble two"></div>
              <div className="bubble three"></div>
              <div className="board">
                <div className="board-top">
                  <div className="pill sun">☀️ Science review</div>
                  <div className="pill mint">Ready to share</div>
                </div>

                <div className="quiz-card">
                  <strong>What do plants need most to make food?</strong>
                  <div className="lines">
                    <div className="line"></div>
                    <div className="line mid"></div>
                  </div>
                  <div className="choices">
                    <div className="choice"><span className="dot pink"></span> Sunlight</div>
                    <div className="choice"><span className="dot blue"></span> Moonlight</div>
                    <div className="choice"><span className="dot green"></span> Sand</div>
                  </div>
                </div>

                <div className="empty-state">
                  <div className="illustration">
                    <div className="paper"></div>
                    <div className="spark"></div>
                    <div className="star"></div>
                  </div>
                  <div>
                    <h3>Your quiz draft appears here</h3>
                    <p className="empty-copy">
                      Paste a lesson topic, choose a grade band, and QuizSprout builds a playful first draft you can tweak in seconds.
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>

        <section className="section" id="features">
          <div className="container">
            <div className="section-bg bg-mint">
              <div className="section-head">
                <div>
                  <h2>Little helpers for real classroom days</h2>
                </div>
                <p className="subtle">
                  Built for teachers who want polished quizzes without spending prep time nudging boxes around.
                </p>
              </div>

              <div className="grid-3">
                <FeatureCard
                  icon="🧠"
                  color="linear-gradient(135deg, #ffe08a, #ffc36b)"
                  title="Topic-to-quiz drafts"
                  text="Start with a unit topic, lesson notes, or a few keywords and get age-appropriate questions right away."
                />
                <FeatureCard
                  icon="🎨"
                  color="linear-gradient(135deg, #a4e7c2, #69d7ad)"
                  title="Colorful class-ready layouts"
                  text="Pick cheerful templates that feel approachable for students and still clean enough for school use."
                />
                <FeatureCard
                  icon="🌈"
                  color="linear-gradient(135deg, #9ed6ff, #7ba8ff)"
                  title="Empty states that guide"
                  text="When you have nothing to start from, gentle prompts and illustrated placeholders help you move fast."
                />
              </div>
            </div>
          </div>
        </section>

        <section className="section" id="how">
          <div className="container">
            <div className="section-bg bg-sky">
              <div className="section-head">
                <div>
                  <h2>From idea to quiz in three easy steps</h2>
                </div>
                <p className="subtle">
                  Simple enough for a five-minute prep gap between classes.
                </p>
              </div>

              <div className="workflow">
                <StepCard
                  num="1"
                  color="#ffe3a6"
                  title="Drop in a topic"
                  text="Type something like “fractions review” or paste a reading passage and choose your grade level."
                  illustration={
                    <>
                      <div className="mini-card" style={{left: 14, right: 14, top: 16, height: 46}}></div>
                      <div className="mini-badge" style={{left: 20, top: 24, width: 92, height: 12, background: '#dbeafe'}}></div>
                      <div className="mini-badge" style={{left: 20, top: 44, width: 130, height: 10, background: '#ecf5ff'}}></div>
                      <div className="mini-circle" style={{right: 20, top: 28, width: 26, height: 26, background: '#ffd25e'}}></div>
                    </>
                  }
                />
                <StepCard
                  num="2"
                  color="#cdeed9"
                  title="Pick your style"
                  text="Choose multiple choice, true/false, or mixed practice. Adjust tone, difficulty, and number of questions."
                  illustration={
                    <>
                      <div className="mini-card" style={{left: 18, top: 18, width: 90, height: 70}}></div>
                      <div className="mini-card" style={{left: 120, top: 26, width: 78, height: 54, background: '#fff8d8'}}></div>
                      <div className="mini-badge" style={{left: 30, top: 32, width: 50, height: 10, background: '#d6f4e2'}}></div>
                      <div className="mini-badge" style={{left: 130, top: 42, width: 36, height: 36, background: '#9fe3be'}}></div>
                    </>
                  }
                />
                <StepCard
                  num="3"
                  color="#d5e6ff"
                  title="Share and smile"
                  text="Export, print, or send digitally. Keep the draft, remix it later, or build a new version in one tap."
                  illustration={
                    <>
                      <div className="mini-card" style={{left: 20, top: 18, width: 76, height: 78}}></div>
                      <div className="mini-card" style={{left: 86, top: 30, width: 112, height: 54, background: '#f0f7ff'}}></div>
                      <div className="mini-circle" style={{left: 38, top: 34, width: 14, height: 14, background: '#ff92ab'}}></div>
                      <div className="mini-badge" style={{left: 100, top: 44, width: 72, height: 10, background: '#d9ebff'}}></div>
                      <div className="mini-badge" style={{left: 100, top: 62, width: 54, height: 10, background: '#edf5ff'}}></div>
                    </>
                  }
                />
              </div>
            </div>
          </div>
        </section>

        <section className="section" id="teachers">
          <div className="container">
            <div className="section-bg bg-peach">
              <div className="section-head">
                <div>
                  <h2>Made to feel warm, not technical</h2>
                </div>
                <p className="subtle">
                  The interface stays playful and approachable so teachers can focus on students, not settings.
                </p>
              </div>

              <div className="testimonials">
                <div className="testimonial">
                  <h3>“It feels like having a cheerful planning buddy.”</h3>
                  <p>
                    I can type a lesson topic, get a first quiz draft, and adjust a few questions before the bell rings.
                    The empty states are actually helpful instead of just blank boxes.
                  </p>
                  <div className="avatar-row">
                    <div className="avatar">M</div>
                    <div>
                      Mia R.
                      <div style={{color: 'var(--muted)', fontWeight: 700}}>4th Grade Teacher</div>
                    </div>
                  </div>
                </div>

                <div className="quote-card">
                  <div>
                    <div className="pill sun" style={{display:'inline-flex', marginBottom: 12}}>Illustrated empty state</div>
                    <div className="illustration" style={{width:'100%', height:170}}>
                      <div className="paper" style={{left:'50%', top:50, transform:'translateX(-50%)'}}></div>
                      <div className="spark" style={{top:26, right:80}}></div>
                      <div className="star" style={{left:76, bottom:30}}></div>
                      <div className="mini-circle" style={{position:'absolute', width:18, height:18, background:'#8dd6ff', top:36, left:84}}></div>
                      <div className="mini-circle" style={{position:'absolute', width:14, height:14, background:'#ffc94d', bottom:40, right:84}}></div>
                    </div>
                  </div>
                  <p>Nothing drafted yet? QuizSprout nudges you with examples, sample prompts, and friendly starter ideas.</p>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section className="section" id="start">
          <div className="container">
            <div className="cta">
              <h2>Make your next quiz before your coffee cools.</h2>
              <p>
                Start with a topic, get a polished draft, and spend your energy on teaching instead of formatting.
              </p>
              <div className="hero-actions" style={{justifyContent:'center', marginBottom: 0}}>
                <a href="#" className="btn btn-primary">Start free</a>
                <a href="#" className="btn btn-secondary">Watch quick demo</a>
              </div>
            </div>

            <footer className="footer">
              <div>QuizSprout • playful quiz-making for teachers</div>
              <div>Templates • Privacy • Contact</div>
            </footer>
          </div>
        </section>
      </div>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
