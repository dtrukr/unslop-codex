<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <script>

      theme: {
        extend: {
          colors: {
            slateNight: "#0f172a",
            ink: "#172033",
            mint: "#d7fff2",
            tealbrand: "#0f766e",
            tealsoft: "#14b8a6",

            sans: ["Inter", "system-ui", "sans-serif"],

      }

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@700;800&display=swap" rel="stylesheet">

    .glass {
      background: rgba(255,255,255,0.7);

    .grid-fade {
      background-image:
        linear-gradient(rgba(15,23,42,0.05) 1px, transparent 1px),

      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);

</head>
<body class="font-sans antialiased">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    function SectionTitle({ eyebrow, title, subtitle, center = false }) {
      return (
        <div className={center ? "text-center max-w-3xl mx-auto" : "max-w-2xl"}>
          <div className="inline-flex items-center gap-2 rounded-full border border-teal-200 bg-white/80 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-tealbrand">

          </div>
          <h2 className="mt-4 font-display text-3xl font-extrabold tracking-tight text-slateNight sm:text-4xl">
            {title}
          </h2>
          <p className="mt-4 text-base leading-7 text-slate-600 sm:text-lg">
            {subtitle}
          </p>
        </div>
      );
    }

    function Stat({ value, label }) {
      return (
        <div className="rounded-2xl border border-slate-200/70 bg-white/80 p-5 shadow-sm">
          <div className="font-display text-3xl font-extrabold text-slateNight">{value}</div>
          <div className="mt-1 text-sm text-slate-600">{label}</div>
        </div>

    }

    function FeatureCard({ title, text, icon }) {
      return (
        <div className="mesh-card rounded-3xl border border-white/70 p-6 shadow-sm transition-transform duration-300 hover:-translate-y-1 hover:shadow-glow">
          <div className="flex h-12 w-12 items-center justify-center rounded-2xl bg-teal-50 text-xl text-tealbrand">

          <h3 className="mt-5 text-xl font-semibold text-slateNight">{title}</h3>
          <p className="mt-3 text-sm leading-7 text-slate-600">{text}</p>
        </div>
      );
    }

    function Testimonial({ quote, name, role }) {
      return (
        <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
          <p className="text-base leading-7 text-slate-700">“{quote}”</p>

            <div className="text-sm text-slate-500">{role}</div>

                    <div className="rounded-2xl bg-white/10 p-4">

                    <div className="rounded-2xl bg-white/10 p-4">
