<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizPop for Teachers</title>
  <style>
    :root {
      --cream: #fffaf1;
      --ink: #2f2541;
      --berry: #ff6b84;
      --gold: #ffcf59;
      --mint: #8ce1c7;
      --sky: #8cc9ff;
      --peach: #ffbf9f;
      --paper: #fffdf7;
      --line: rgba(47, 37, 65, 0.14);
      --shadow: 0 18px 40px rgba(78, 56, 113, 0.12);
      --radius: 28px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 207, 89, 0.28), transparent 26%),
        radial-gradient(circle at 85% 12%, rgba(140, 201, 255, 0.28), transparent 28%),
        var(--cream);
    }

    a { color: inherit; text-decoration: none; }
    img, svg { display: block; }

    .shell {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 0 8px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      letter-spacing: 0.02em;
      font-size: 1.1rem;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 15px;
      background: linear-gradient(145deg, var(--berry), #ff8b56);
      position: relative;
      box-shadow: 0 10px 18px rgba(255, 107, 132, 0.32);
      transform: rotate(-6deg);
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: var(--paper);
    }

    .brand-mark::before {
      width: 22px;
      height: 8px;
      left: 12px;
      top: 13px;
      transform: rotate(-8deg);
    }

    .brand-mark::after {
      width: 16px;
      height: 8px;
      left: 15px;
      top: 25px;
    }

    .nav-links {
      display: flex;
      gap: 18px;
      align-items: center;
      font-size: 0.98rem;
    }

    .chip-btn, .primary-btn, .secondary-btn {
      border: 0;
      cursor: pointer;
      font: inherit;
      transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
    }

    .chip-btn {
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(47, 37, 65, 0.08);
    }

    .primary-btn {
      padding: 14px 22px;
      border-radius: 18px;
      background: var(--ink);
      color: var(--paper);
      box-shadow: 0 12px 24px rgba(47, 37, 65, 0.18);
    }

    .secondary-btn {
      padding: 14px 20px;
      border-radius: 18px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(47, 37, 65, 0.09);
    }

    .chip-btn:hover, .primary-btn:hover, .secondary-btn:hover {
      transform: translateY(-2px);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 30px;
      align-items: center;
      padding: 28px 0 54px;
    }

    .hero-copy {
      position: relative;
      padding: 18px 0 18px 8px;
    }

    .hero-copy::before {
      content: "";
      position: absolute;
      inset: auto auto 24px -10px;
      width: 86px;
      height: 22px;
      background: rgba(255, 207, 89, 0.46);
      z-index: -1;
      border-radius: 999px;
      transform: rotate(-5deg);
    }

    .eyebrow {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      background: rgba(255,255,255,0.78);
      border: 1px dashed rgba(47, 37, 65, 0.18);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.95rem;
      margin-bottom: 14px;
    }

    h1, h2, h3, p { margin: 0; }
    h1 {
      font-size: clamp(3rem, 8vw, 5.6rem);
      line-height: 0.92;
      letter-spacing: -0.05em;
      max-width: 10ch;
    }

    .hero p {
      margin-top: 18px;
      font-size: 1.08rem;
      line-height: 1.7;
      max-width: 50ch;
      color: rgba(47, 37, 65, 0.8);
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .teacher-note {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 22px;
      font-size: 0.95rem;
      color: rgba(47, 37, 65, 0.78);
    }

    .avatars {
      display: flex;
      margin-right: 4px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 3px solid var(--cream);
      margin-left: -10px;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: var(--ink);
    }

    .hero-art {
      position: relative;
      min-height: 560px;
    }

    .hero-card, .paper, .feature-card, .step, .testimonial, .footer-card {
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(47, 37, 65, 0.08);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .hero-card {
      border-radius: 34px;
      padding: 22px;
      position: absolute;
    }

    .dashboard {
      inset: 42px 20px 60px 32px;
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,250,241,0.94));
    }

    .dashboard-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .window-dots {
      display: flex;
      gap: 8px;
    }

    .window-dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--peach);
    }

    .window-dots span:nth-child(2) { background: var(--gold); }
    .window-dots span:nth-child(3) { background: var(--mint); }

    .board {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 14px;
      height: calc(100% - 46px);
    }

    .paper {
      border-radius: 24px;
      padding: 18px;
      background: var(--paper);
      position: relative;
    }

    .scribble {
      position: absolute;
      inset: 10px 16px auto auto;
      width: 56px;
      height: 16px;
      border-top: 3px solid rgba(255, 107, 132, 0.6);
      border-radius: 50%;
      transform: rotate(8deg);
    }

    .quiz-list {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .quiz-pill {
      padding: 12px 14px;
      border-radius: 16px;
      font-size: 0.95rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .quiz-pill:nth-child(1) { background: rgba(140, 201, 255, 0.22); }
    .quiz-pill:nth-child(2) { background: rgba(140, 225, 199, 0.24); }
    .quiz-pill:nth-child(3) { background: rgba(255, 207, 89, 0.25); }

    .stars {
      display: flex;
      gap: 6px;
    }

    .stars i {
      width: 12px;
      height: 12px;
      background: var(--berry);
      clip-path: polygon(50% 0, 61% 38%, 100% 38%, 69% 59%, 81% 100%, 50% 74%, 19% 100%, 31% 59%, 0 38%, 39% 38%);
    }

    .empty-state {
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .empty-illustration {
      width: 100%;
      height: 100%;
      border-radius: 24px;
      background:
        radial-gradient(circle at 24% 22%, rgba(255, 207, 89, .55), transparent 16%),
        radial-gradient(circle at 82% 30%, rgba(140, 201, 255, .5), transparent 17%),
        linear-gradient(180deg, #fff9ed, #fffdf8);
      position: relative;
      border: 2px dashed rgba(47, 37, 65, 0.12);
    }

    .plant, .mug, .bubble, .sheet {
      position: absolute;
    }

    .sheet {
      width: 132px;
      height: 164px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -46%) rotate(-6deg);
      background: white;
      border-radius: 18px;
      border: 2px solid rgba(47, 37, 65, 0.08);
      box-shadow: 0 18px 30px rgba(94, 76, 130, 0.12);
      padding: 18px;
    }

    .sheet::before, .sheet::after {
      content: "";
      display: block;
      height: 10px;
      border-radius: 999px;
      background: rgba(47, 37, 65, 0.09);
      margin-bottom: 10px;
    }

    .sheet::after { width: 70%; }

    .bubble {
      right: 20px;
      top: 24px;
      width: 82px;
      height: 58px;
      background: var(--berry);
      border-radius: 22px 22px 22px 6px;
      transform: rotate(8deg);
    }

    .bubble::before, .bubble::after {
      content: "";
      position: absolute;
      background: white;
      border-radius: 50%;
      top: 24px;
      width: 7px;
      height: 7px;
      left: 22px;
      box-shadow: 14px 0 0 white, 28px 0 0 white;
    }

    .plant {
      left: 18px;
      bottom: 22px;
      width: 50px;
      height: 70px;
      background: linear-gradient(180deg, #b57d43 0 32%, #d69b59 32%);
      border-radius: 16px 16px 12px 12px;
    }

    .plant::before, .plant::after {
      content: "";
      position: absolute;
      width: 22px;
      height: 36px;
      background: #6ec98d;
      border-radius: 20px 20px 4px 20px;
      top: -24px;
    }

    .plant::before { left: 4px; transform: rotate(-18deg); }
    .plant::after { right: 5px; transform: rotate(24deg); }

    .mug {
      right: 28px;
      bottom: 24px;
      width: 42px;
      height: 34px;
      background: var(--sky);
      border-radius: 10px 10px 16px 16px;
      border: 2px solid rgba(47, 37, 65, 0.08);
    }

    .mug::before {
      content: "";
      position: absolute;
      right: -11px;
      top: 7px;
      width: 14px;
      height: 14px;
      border: 3px solid rgba(47, 37, 65, 0.12);
      border-left: none;
      border-radius: 0 10px 10px 0;
    }

    section {
      margin: 26px 0;
      border-radius: 38px;
      overflow: hidden;
      position: relative;
    }

    .section-pad {
      padding: 42px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: end;
      margin-bottom: 24px;
    }

    .section-head h2 {
      font-size: clamp(2rem, 4.4vw, 3.4rem);
      line-height: 1;
      letter-spacing: -0.05em;
      max-width: 12ch;
    }

    .section-head p {
      max-width: 40ch;
      line-height: 1.65;
      color: rgba(47, 37, 65, 0.78);
    }

    .features-wrap {
      background: linear-gradient(180deg, rgba(255, 240, 212, 0.92), rgba(255, 225, 202, 0.92));
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .feature-card {
      border-radius: 28px;
      padding: 20px;
      background: rgba(255, 253, 247, 0.84);
    }

    .feature-card h3 {
      font-size: 1.25rem;
      margin-top: 16px;
      margin-bottom: 8px;
    }

    .feature-card p {
      line-height: 1.6;
      color: rgba(47, 37, 65, 0.78);
      font-size: 0.97rem;
    }

    .icon-badge {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 1.5rem;
      background: white;
      box-shadow: inset 0 0 0 1px rgba(47, 37, 65, 0.08);
    }

    .steps-wrap {
      background: linear-gradient(180deg, rgba(210, 241, 255, 0.95), rgba(224, 249, 241, 0.96));
    }

    .steps-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .step {
      border-radius: 28px;
      padding: 24px;
      background: rgba(255,255,255,0.75);
    }

    .step-num {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-weight: 900;
      background: var(--gold);
      margin-bottom: 18px;
    }

    .step p {
      margin-top: 10px;
      color: rgba(47, 37, 65, 0.76);
      line-height: 1.65;
    }

    .testimonial-wrap {
      background:
        radial-gradient(circle at 10% 18%, rgba(255, 107, 132, 0.15), transparent 20%),
        linear-gradient(180deg, rgba(255, 248, 222, 0.98), rgba(255, 252, 242, 0.96));
    }

    .testimonial {
      border-radius: 28px;
      padding: 26px;
      max-width: 760px;
      background: rgba(255,255,255,0.74);
    }

    .quote {
      font-size: clamp(1.25rem, 2.8vw, 2rem);
      line-height: 1.35;
      letter-spacing: -0.03em;
    }

    .byline {
      margin-top: 16px;
      color: rgba(47, 37, 65, 0.72);
    }

    footer {
      padding: 12px 0 44px;
    }

    .footer-card {
      border-radius: 34px;
      padding: 28px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: center;
      background: linear-gradient(135deg, rgba(255,255,255,0.82), rgba(255, 250, 241, 0.92));
    }

    .footer-card p {
      color: rgba(47, 37, 65, 0.74);
      margin-top: 8px;
      line-height: 1.6;
    }

    .wiggle {
      animation: floaty 5.5s ease-in-out infinite;
      transform-origin: center;
    }

    .delay { animation-delay: -2s; }

    @keyframes floaty {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(2deg); }
    }

    @media (max-width: 940px) {
      .hero, .features-grid, .steps-grid, .footer-card, .section-head { grid-template-columns: 1fr; display: grid; }
      .hero-art { min-height: 500px; }
      .dashboard { inset: 22px 0 20px; }
      .section-pad { padding: 30px 22px; }
      .nav-links a:not(.chip-btn) { display: none; }
    }

    @media (max-width: 640px) {
      .hero-actions, .footer-card { display: flex; flex-direction: column; align-items: stretch; }
      .board { grid-template-columns: 1fr; }
      .hero-art { min-height: 620px; }
      .dashboard { inset: 12px 0 10px; }
      .teacher-note { align-items: flex-start; }
    }

    @media (prefers-reduced-motion: reduce) {
      .wiggle, .delay, .chip-btn, .primary-btn, .secondary-btn { animation: none; transition: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React from "https://esm.sh/react@18.3.1";
    import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";

    const features = [
      { icon: "✏️", title: "Prompt to quiz", text: "Paste a lesson outline, chapter, or video transcript and turn it into ready-to-edit questions in seconds." },
      { icon: "🎯", title: "Level-aware choices", text: "Switch from warm-up to challenge mode with age-appropriate wording and answer difficulty built in." },
      { icon: "🧁", title: "Gentle empty states", text: "When there’s nothing here yet, QuizPop shows clear next steps instead of another lonely blank screen." }
    ];

    const steps = [
      { n: "1", title: "Drop in your topic", text: "Type “fractions,” paste a reading passage, or import notes from today’s lesson." },
      { n: "2", title: "Pick your quiz flavor", text: "Multiple choice, exit ticket, vocabulary check, or a quick mixed review with timers and hints." },
      { n: "3", title: "Share and smile", text: "Send to Google Classroom, export as a worksheet, or present it live on the board." }
    ];

    function HeroArt() {
      return (
        <div className="hero-art">
          <div className="hero-card dashboard">
            <div className="dashboard-top">
              <div className="window-dots"><span></span><span></span><span></span></div>
              <div className="chip-btn" style={{padding:"8px 12px", fontSize:".88rem"}}>Friday science quiz</div>
            </div>
            <div className="board">
              <div className="paper wiggle">
                <div className="scribble"></div>
                <strong>Auto-generated set</strong>
                <div className="quiz-list">
                  <div className="quiz-pill"><span>5 quick checks</span><div className="stars"><i></i><i></i><i></i></div></div>
                  <div className="quiz-pill"><span>2 discussion prompts</span><div className="stars"><i></i><i></i><i></i></div></div>
                  <div className="quiz-pill"><span>1 exit ticket</span><div className="stars"><i></i><i></i><i></i></div></div>
                </div>
              </div>
              <div className="paper empty-state delay">
                <div className="empty-illustration">
                  <div className="bubble"></div>
                  <div className="sheet"></div>
                  <div className="plant"></div>
                  <div className="mug"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      return (
        <div className="shell">
          <nav className="nav">
            <div className="brand">
              <div className="brand-mark"></div>
              <span>QuizPop</span>
            </div>
            <div className="nav-links">
              <a href="#features">Features</a>
              <a href="#how">How it works</a>
              <a href="#teachers">Teachers</a>
              <a className="chip-btn" href="#start">Start free</a>
            </div>
          </nav>

          <header className="hero">
            <div className="hero-copy">
              <div className="eyebrow"><span>🍎</span><span>Made for busy teachers and bright little “aha!” moments</span></div>
              <h1>Quiz creation, without the after-school scramble.</h1>
              <p>
                QuizPop helps teachers turn lessons into friendly, ready-to-share quizzes fast.
                Fewer tabs, less formatting, more time for actual teaching.
              </p>
              <div className="hero-actions">
                <button className="primary-btn">Make my first quiz</button>
                <button className="secondary-btn">See a sample class</button>
              </div>
              <div className="teacher-note">
                <div className="avatars">
                  <div className="avatar" style={{background:"#ffd79f"}}>M</div>
                  <div className="avatar" style={{background:"#aee8d1"}}>J</div>
                  <div className="avatar" style={{background:"#b8d8ff"}}>A</div>
                </div>
                <span>Trusted by teachers who want better quizzes and calmer prep periods.</span>
              </div>
            </div>
            <HeroArt />
          </header>

          <section id="features" className="features-wrap">
            <div className="section-pad">
              <div className="section-head">
                <div>
                  <h2>Colorful tools that feel easy right away.</h2>
                </div>
                <p>Everything is designed to be warm, quick, and a little playful, so building a quiz never feels like opening another spreadsheet.</p>
              </div>
              <div className="features-grid">
                {features.map((item) => (
                  <article className="feature-card" key={item.title}>
                    <div className="icon-badge">{item.icon}</div>
                    <h3>{item.title}</h3>
                    <p>{item.text}</p>
                  </article>
                ))}
              </div>
            </div>
          </section>

          <section id="how" className="steps-wrap">
            <div className="section-pad">
              <div className="section-head">
                <div>
                  <h2>Three small steps from lesson plan to quiz.</h2>
                </div>
                <p>Use it for bell ringers, review games, homework checks, or those last-five-minutes exit tickets that usually get rushed.</p>
              </div>
              <div className="steps-grid">
                {steps.map((step) => (
                  <article className="step" key={step.n}>
                    <div className="step-num">{step.n}</div>
                    <h3>{step.title}</h3>
                    <p>{step.text}</p>
                  </article>
                ))}
              </div>
            </div>
          </section>

          <section id="teachers" className="testimonial-wrap">
            <div className="section-pad">
              <div className="testimonial">
                <p className="quote">
                  “It feels like having a cheerful planning assistant. I paste my topic in, tweak two questions,
                  and I’m ready before the copier even warms up.”
                </p>
                <p className="byline">Rina P., 4th grade teacher</p>
              </div>
            </div>
          </section>

          <footer id="start">
            <div className="footer-card">
              <div>
                <div className="eyebrow" style={{marginBottom:10}}><span>🌈</span><span>Friendly from the first click</span></div>
                <h2 style={{fontSize:"clamp(2rem, 4vw, 3rem)", lineHeight:"1", letterSpacing:"-0.05em"}}>Start with one quiz. Leave with your prep time back.</h2>
                <p>Free to try, easy to share, and simple enough for the busiest week of the semester.</p>
              </div>
              <div style={{display:"flex", gap:"12px", flexWrap:"wrap"}}>
                <button className="primary-btn">Start free</button>
                <button className="secondary-btn">Book a quick demo</button>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
