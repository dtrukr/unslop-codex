<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizSprout for Teachers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #2b2140;
      --paper: #fff8ef;
      --sun: #ffd36c;
      --peach: #ffb79d;
      --mint: #9ce7c0;
      --sky: #9fd9ff;
      --berry: #ef6d86;
      --plum: #5e4a9a;
      --leaf: #2f865f;
      --chalk: #f7f4ec;
      --line: rgba(43, 33, 64, 0.12);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Nunito", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 20%, rgba(255, 211, 108, 0.65), transparent 22%),
        radial-gradient(circle at 92% 14%, rgba(159, 217, 255, 0.65), transparent 20%),
        linear-gradient(180deg, #fff6e7 0%, #fff9f2 48%, #fff4ef 100%);
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; }

    .studio {
      width: min(1280px, calc(100vw - 32px));
      margin: 18px auto 28px;
      display: grid;
      gap: 18px;
    }

    .rail,
    .opening,
    .planner,
    .empties,
    .pathway,
    .closing {
      border: 2px solid rgba(43, 33, 64, 0.14);
      overflow: clip;
      position: relative;
    }

    .rail {
      background: linear-gradient(90deg, #fff7df 0%, #ffe9b1 42%, #ffd794 100%);
      border-radius: 28px 28px 18px 18px;
      padding: 16px 20px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-burst {
      width: 56px;
      height: 56px;
      background: conic-gradient(from 220deg, #ef6d86, #ffcb6b, #83dcb3, #7aa7ff, #ef6d86);
      border-radius: 18px 22px 14px 20px;
      position: relative;
      box-shadow: inset 0 0 0 2px rgba(43,33,64,0.1);
    }

    .logo-burst::after {
      content: "Q";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-family: "Baloo 2", cursive;
      font-weight: 800;
      font-size: 34px;
      color: #fff8ef;
      transform: rotate(-8deg);
    }

    .wordmark strong {
      display: block;
      font-family: "Baloo 2", cursive;
      font-size: 2rem;
      line-height: 0.95;
      letter-spacing: 0.01em;
    }

    .wordmark span {
      font-size: 0.95rem;
      color: rgba(43, 33, 64, 0.8);
    }

    .subject-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .subject-strip span {
      background: rgba(255,255,255,0.55);
      padding: 8px 14px 9px;
      border-radius: 14px 10px 15px 12px;
      border: 1px dashed rgba(43, 33, 64, 0.2);
      font-weight: 800;
      font-size: 0.95rem;
      transform: rotate(var(--tilt, 0deg));
    }

    .subject-strip span:nth-child(2) { --tilt: -2deg; }
    .subject-strip span:nth-child(3) { --tilt: 1.5deg; }
    .subject-strip span:nth-child(4) { --tilt: -1deg; }

    .rail-note {
      display: grid;
      justify-items: end;
      gap: 6px;
      text-align: right;
    }

    .rail-note b {
      font-size: 1rem;
    }

    .rail-note small {
      color: rgba(43, 33, 64, 0.78);
      max-width: 22ch;
    }

    .opening {
      background:
        linear-gradient(110deg, #fffef7 0 46%, #fff6d9 46% 100%);
      border-radius: 18px 38px 28px 34px;
      padding: clamp(22px, 3vw, 42px);
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      gap: clamp(20px, 3vw, 38px);
      align-items: center;
      min-height: 560px;
    }

    .note-sheet {
      background:
        repeating-linear-gradient(
          180deg,
          rgba(122,167,255,0.08) 0,
          rgba(122,167,255,0.08) 1px,
          transparent 1px,
          transparent 34px
        ),
        #fffdf8;
      border: 2px solid rgba(43,33,64,0.12);
      border-radius: 26px 34px 24px 30px;
      padding: clamp(24px, 4vw, 42px);
      position: relative;
      box-shadow: 0 14px 0 rgba(255, 183, 157, 0.28);
    }

    .note-sheet::before,
    .note-sheet::after {
      content: "";
      position: absolute;
      width: 62px;
      height: 18px;
      background: rgba(159,217,255,0.55);
      top: 16px;
      border-radius: 8px;
      transform: rotate(-6deg);
    }

    .note-sheet::after {
      right: 22px;
      transform: rotate(8deg);
      background: rgba(255, 211, 108, 0.58);
    }

    .note-sheet::before {
      left: 26px;
    }

    .note-sheet h1 {
      margin: 18px 0 16px;
      font-family: "Baloo 2", cursive;
      font-size: clamp(3rem, 6vw, 5.6rem);
      line-height: 0.92;
      letter-spacing: 0.01em;
      max-width: 9.5ch;
    }

    .lead {
      font-size: clamp(1.08rem, 1.8vw, 1.28rem);
      line-height: 1.55;
      max-width: 34ch;
      margin-bottom: 22px;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 18px;
      align-items: center;
      margin-bottom: 24px;
    }

    .launch {
      background: var(--berry);
      color: #fff8ef;
      border: none;
      padding: 14px 22px;
      border-radius: 18px 14px 22px 16px;
      font-weight: 800;
      box-shadow: 0 8px 0 rgba(192, 81, 104, 0.25);
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .launch:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 0 rgba(192, 81, 104, 0.2);
    }

    .peek {
      font-weight: 800;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
    }

    .micro-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
      max-width: 34rem;
    }

    .micro-list li {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: start;
      font-size: 1rem;
    }

    .micro-list i {
      width: 32px;
      height: 32px;
      border-radius: 10px 12px 10px 14px;
      display: grid;
      place-items: center;
      font-style: normal;
      background: rgba(156, 231, 192, 0.56);
      border: 1px solid rgba(43,33,64,0.1);
    }

    .board-side {
      display: grid;
      gap: 16px;
      align-items: start;
    }

    .chalkboard {
      background: linear-gradient(180deg, #2f865f 0%, #2d7a55 100%);
      color: var(--chalk);
      border-radius: 34px 20px 30px 18px;
      padding: 24px;
      min-height: 330px;
      position: relative;
      border: 10px solid #f0b868;
      box-shadow: inset 0 0 0 2px rgba(247,244,236,0.14);
    }

    .chalkboard h2 {
      margin: 0 0 10px;
      font-family: "Baloo 2", cursive;
      font-size: 2rem;
      line-height: 1;
    }

    .chalk-lines {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .chalk-lines span {
      display: block;
      height: 16px;
      border-radius: 10px;
      background: rgba(247,244,236,0.18);
      width: var(--w);
    }

    .chalk-badge {
      position: absolute;
      right: 18px;
      top: 16px;
      background: #ffefbd;
      color: var(--ink);
      font-weight: 800;
      padding: 8px 12px;
      border-radius: 12px 10px 14px 8px;
      transform: rotate(8deg);
    }

    .empty-stack {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .mini-state {
      padding: 16px;
      min-height: 140px;
      background: rgba(255,255,255,0.88);
      border-radius: 22px 16px 20px 14px;
      border: 2px solid rgba(43,33,64,0.1);
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .mini-state b {
      font-size: 1rem;
    }

    .mini-state p {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.45;
      color: rgba(43, 33, 64, 0.8);
    }

    .mini-state svg {
      width: 72px;
      height: 54px;
    }

    .planner {
      background: linear-gradient(180deg, #fff3b6 0%, #ffe695 100%);
      border-radius: 26px 18px 32px 20px;
      padding: 26px;
    }

    .planner-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }

    .planner-head h3,
    .empties h3,
    .pathway h3 {
      margin: 0;
      font-family: "Baloo 2", cursive;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 0.98;
    }

    .planner-head p,
    .empties-intro,
    .pathway-intro {
      margin: 0;
      max-width: 34ch;
      line-height: 1.55;
      font-size: 1.05rem;
    }

    .week-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(200px, 1fr));
      gap: 12px;
    }

    .day-card {
      background: rgba(255,255,255,0.62);
      padding: 16px;
      border-radius: 20px 14px 18px 12px;
      border: 1px solid rgba(43,33,64,0.12);
      display: grid;
      gap: 10px;
      min-height: 176px;
    }

    .day-card header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      font-weight: 800;
    }

    .marker {
      width: 16px;
      height: 16px;
      border-radius: 5px 7px 4px 8px;
      background: var(--swatch);
      border: 1px solid rgba(43,33,64,0.1);
    }

    .ticket {
      background: #fffdf8;
      border: 1px dashed rgba(43,33,64,0.18);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 0.96rem;
      line-height: 1.45;
    }

    .empties {
      background: linear-gradient(180deg, #dff8f4 0%, #d2f1ff 100%);
      border-radius: 20px 34px 20px 34px;
      padding: clamp(22px, 3vw, 30px);
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 20px;
      align-items: start;
    }

    .empties-copy {
      padding: 8px 4px 0;
    }

    .state-gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: start;
    }

    .state-card {
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(43,33,64,0.12);
      padding: 18px;
      display: grid;
      gap: 10px;
    }

    .state-card:nth-child(1) { border-radius: 28px 16px 20px 18px; }
    .state-card:nth-child(2) { border-radius: 16px 28px 18px 24px; margin-top: 30px; }
    .state-card:nth-child(3) { border-radius: 22px 18px 30px 18px; grid-column: span 2; }

    .state-card svg {
      width: 100%;
      max-width: 260px;
      height: auto;
    }

    .state-card strong {
      font-size: 1.05rem;
    }

    .state-card p {
      margin: 0;
      line-height: 1.52;
      color: rgba(43, 33, 64, 0.8);
    }

    .pathway {
      background: linear-gradient(180deg, #ffc9cf 0%, #ffdfe0 100%);
      border-radius: 30px 18px 26px 22px;
      padding: clamp(22px, 3vw, 34px);
    }

    .pathway-top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: end;
      margin-bottom: 26px;
    }

    .route {
      position: relative;
      min-height: 280px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      align-items: start;
    }

    .route svg {
      position: absolute;
      inset: 10px 0 0;
      width: 100%;
      height: calc(100% - 20px);
      pointer-events: none;
    }

    .stop {
      position: relative;
      z-index: 1;
      max-width: 260px;
      background: rgba(255,255,255,0.56);
      border: 1px solid rgba(43,33,64,0.12);
      padding: 18px;
    }

    .stop:nth-child(1) {
      margin-top: 14px;
      border-radius: 20px 14px 22px 14px;
    }

    .stop:nth-child(2) {
      margin: 122px auto 0;
      border-radius: 16px 24px 18px 22px;
    }

    .stop:nth-child(3) {
      margin-left: auto;
      margin-top: 30px;
      border-radius: 24px 16px 20px 18px;
    }

    .stop .num {
      width: 34px;
      height: 34px;
      border-radius: 11px 14px 10px 15px;
      display: grid;
      place-items: center;
      font-weight: 800;
      background: var(--sky);
      margin-bottom: 10px;
    }

    .stop:nth-child(2) .num { background: var(--sun); }
    .stop:nth-child(3) .num { background: var(--mint); }

    .stop strong {
      display: block;
      margin-bottom: 6px;
      font-size: 1.08rem;
    }

    .stop p {
      margin: 0;
      line-height: 1.52;
      color: rgba(43, 33, 64, 0.8);
    }

    .closing {
      background: linear-gradient(90deg, #fffdf5 0%, #ffe9ea 100%);
      border-radius: 18px 24px 30px 18px;
      padding: 22px 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
    }

    .closing h4 {
      margin: 0 0 6px;
      font-family: "Baloo 2", cursive;
      font-size: 2rem;
      line-height: 0.98;
    }

    .closing p {
      margin: 0;
      line-height: 1.5;
      max-width: 40ch;
    }

    .closing a {
      justify-self: end;
    }

    .footer-line {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 0 4px 6px;
      color: rgba(43, 33, 64, 0.72);
      font-size: 0.95rem;
    }

    .footer-line div {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    @media (max-width: 980px) {
      .rail,
      .opening,
      .empties,
      .closing {
        grid-template-columns: 1fr;
      }

      .rail-note {
        justify-items: start;
        text-align: left;
      }

      .week-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .pathway-top,
      .planner-head {
        align-items: start;
        flex-direction: column;
      }

      .route {
        grid-template-columns: 1fr;
        min-height: unset;
      }

      .route svg { display: none; }

      .stop,
      .stop:nth-child(1),
      .stop:nth-child(2),
      .stop:nth-child(3) {
        margin: 0;
        max-width: none;
      }
    }

    @media (max-width: 700px) {
      .studio { width: min(100vw - 18px, 100%); }
      .week-row,
      .state-gallery {
        grid-template-columns: 1fr;
      }

      .state-card:nth-child(2),
      .state-card:nth-child(3) {
        margin-top: 0;
        grid-column: auto;
      }

      .empty-stack {
        grid-template-columns: 1fr;
      }

      .subject-strip {
        justify-content: start;
      }

      .footer-line {
        flex-direction: column;
        align-items: start;
      }
    }

    @media (prefers-reduced-motion: no-preference) {
      .note-sheet,
      .chalkboard,
      .day-card,
      .state-card,
      .stop {
        animation: popIn 700ms cubic-bezier(.22, 1, .36, 1) both;
      }

      .chalkboard { animation-delay: 80ms; }
      .day-card:nth-child(2) { animation-delay: 60ms; }
      .day-card:nth-child(3) { animation-delay: 120ms; }
      .day-card:nth-child(4) { animation-delay: 180ms; }
      .state-card:nth-child(2) { animation-delay: 80ms; }
      .state-card:nth-child(3) { animation-delay: 140ms; }
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(20px) rotate(-1deg) scale(0.98); }
      to { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React from "https://esm.sh/react@18.3.1";
    import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
    import htm from "https://esm.sh/htm@3.1.1";

    const html = htm.bind(React.createElement);

    const plannerDays = [
      {
        day: "Monday",
        color: "#ef6d86",
        items: ["Paste your lesson notes", "QuizSprout turns them into 8 warm-up questions", "Print or share in one click"]
      },
      {
        day: "Tuesday",
        color: "#7aa7ff",
        items: ["Adjust reading level", "Mix in two image prompts", "Save as tomorrow's exit ticket"]
      },
      {
        day: "Wednesday",
        color: "#83dcb3",
        items: ["Duplicate last week's quiz", "Swap in three new vocabulary checks", "Keep the same answer key format"]
      },
      {
        day: "Thursday",
        color: "#ffcb6b",
        items: ["Watch student results roll in", "Reuse missed questions for review", "Start Friday in five minutes"]
      }
    ];

    const EmptyClipboard = () => html`
      <svg viewBox="0 0 220 130" aria-hidden="true">
        <rect x="46" y="18" width="118" height="90" rx="18" fill="#fff8ef" stroke="#2b2140" stroke-opacity=".16" stroke-width="2"/>
        <rect x="82" y="8" width="46" height="18" rx="9" fill="#ffd36c"/>
        <line x1="66" y1="50" x2="142" y2="50" stroke="#7aa7ff" stroke-width="5" stroke-linecap="round" stroke-opacity=".45"/>
        <line x1="66" y1="68" x2="132" y2="68" stroke="#7aa7ff" stroke-width="5" stroke-linecap="round" stroke-opacity=".35"/>
        <circle cx="169" cy="84" r="18" fill="#ef6d86"/>
        <path d="M161 84l6 6 10-12" fill="none" stroke="#fff8ef" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    `;

    const EmptyTray = () => html`
      <svg viewBox="0 0 220 130" aria-hidden="true">
        <rect x="34" y="68" width="152" height="32" rx="16" fill="#fff8ef" stroke="#2b2140" stroke-opacity=".16" stroke-width="2"/>
        <path d="M54 68c8-28 25-42 56-42s48 14 56 42" fill="none" stroke="#2f865f" stroke-width="6" stroke-linecap="round"/>
        <circle cx="84" cy="44" r="10" fill="#9fd9ff"/>
        <circle cx="110" cy="34" r="8" fill="#ffd36c"/>
        <circle cx="136" cy="44" r="10" fill="#9ce7c0"/>
      </svg>
    `;

    const EmptyStars = () => html`
      <svg viewBox="0 0 280 140" aria-hidden="true">
        <rect x="44" y="24" width="192" height="86" rx="28" fill="#fff8ef" stroke="#2b2140" stroke-opacity=".14" stroke-width="2"/>
        <circle cx="95" cy="66" r="18" fill="#9fd9ff"/>
        <circle cx="140" cy="56" r="18" fill="#ffd36c"/>
        <circle cx="185" cy="70" r="18" fill="#9ce7c0"/>
        <path d="M95 58l3 6 6 1-4 5 1 7-6-3-6 3 1-7-4-5 6-1z" fill="#fff8ef"/>
        <path d="M140 48l3 6 6 1-4 5 1 7-6-3-6 3 1-7-4-5 6-1z" fill="#fff8ef"/>
        <path d="M185 62l3 6 6 1-4 5 1 7-6-3-6 3 1-7-4-5 6-1z" fill="#fff8ef"/>
      </svg>
    `;

    function App() {
      return html`
        <main className="studio">
          <section className="rail">
            <div className="logo-wrap">
              <div className="logo-burst"></div>
              <div className="wordmark">
                <strong>QuizSprout</strong>
                <span>quiz-making for teachers who already have enough tabs open</span>
              </div>
            </div>
            <div className="subject-strip" aria-label="Subjects">
              <span>Reading</span>
              <span>Science</span>
              <span>History</span>
              <span>Languages</span>
            </div>
            <div className="rail-note">
              <b>Built for the 7-minute gap before class.</b>
              <small>Draft questions from your notes, slides, or yesterday's worksheet.</small>
            </div>
          </section>

          <section className="opening" id="top">
            <div className="note-sheet">
              <h1>Make the quiz before the bell rings.</h1>
              <p className="lead">
                QuizSprout turns lesson notes into cheerful, classroom-ready quizzes with answer keys, level tweaks,
                and just enough polish to feel prepared even on the busy days.
              </p>
              <div className="action-row">
                <button className="launch">Start a sample quiz</button>
                <a className="peek" href="#planner">See a teacher week</a>
              </div>
              <ul className="micro-list">
                <li><i>1</i><span>Drop in bullet notes, a paragraph, or vocabulary words. The first draft appears fast, not fussy.</span></li>
                <li><i>2</i><span>Switch between warm-up, exit ticket, and review game formats without rebuilding the whole thing.</span></li>
                <li><i>3</i><span>Keep your tone friendly and your question bank organized by unit, class, or reading level.</span></li>
              </ul>
            </div>

            <div className="board-side">
              <div className="chalkboard">
                <div className="chalk-badge">New class set</div>
                <h2>Today's quick quiz</h2>
                <div className="chalk-lines">
                  <span style=${{ "--w": "88%" }}></span>
                  <span style=${{ "--w": "74%" }}></span>
                  <span style=${{ "--w": "91%" }}></span>
                  <span style=${{ "--w": "63%" }}></span>
                </div>
              </div>

              <div className="empty-stack">
                <div className="mini-state">
                  <${EmptyClipboard} />
                  <b>No question bank yet?</b>
                  <p>Start with your lesson outline and QuizSprout fills the first page with editable prompts.</p>
                </div>
                <div className="mini-state">
                  <${EmptyTray} />
                  <b>No worksheet uploaded?</b>
                  <p>Paste text, drag a doc, or type a topic like “plant cells” and begin from there.</p>
                </div>
              </div>
            </div>
          </section>

          <section className="planner" id="planner">
            <div className="planner-head">
              <h3>A playful planning strip for a very real school week.</h3>
              <p>Instead of rebuilding every quiz from scratch, teachers keep one flow moving from lesson prep to review.</p>
            </div>
            <div className="week-row">
              ${plannerDays.map(
                (item) => html`
                  <article className="day-card" key=${item.day}>
                    <header>
                      <span>${item.day}</span>
                      <span className="marker" style=${{ "--swatch": item.color }}></span>
                    </header>
                    ${item.items.map((text) => html`<div className="ticket" key=${text}>${text}</div>`)}
                  </article>
                `
              )}
            </div>
          </section>

          <section className="empties">
            <div className="empties-copy">
              <h3>Empty states that actually help teachers start.</h3>
              <p className="empties-intro">
                The first screen should teach the next step. Each empty state nudges a faster path instead of staring back blankly.
              </p>
            </div>
            <div className="state-gallery">
              <article className="state-card">
                <${EmptyClipboard} />
                <strong>“No quiz yet” becomes “pick a format.”</strong>
                <p>Choose warm-up, review, or exit ticket and the page suggests an opening structure instantly.</p>
              </article>
              <article className="state-card">
                <${EmptyTray} />
                <strong>“Nothing uploaded” gets an easy on-ramp.</strong>
                <p>Teachers can paste notes, import a doc, or borrow last week's quiz without extra setup.</p>
              </article>
              <article className="state-card">
                <${EmptyStars} />
                <strong>“No results yet” turns into a little celebration board.</strong>
                <p>As soon as students finish, missed questions gather in one spot so tomorrow's review basically writes itself.</p>
              </article>
            </div>
          </section>

          <section className="pathway">
            <div className="pathway-top">
              <h3>From lesson notes to a finished quiz in one passing period.</h3>
              <p className="pathway-intro">Three calm steps, shaped for teachers who need speed but still want the final quiz to sound like them.</p>
            </div>
            <div className="route">
              <svg viewBox="0 0 1200 300" preserveAspectRatio="none" aria-hidden="true">
                <path d="M120 80C260 20 360 30 460 130S720 250 860 170s160-70 220-40" fill="none" stroke="rgba(43,33,64,.18)" stroke-width="10" stroke-linecap="round" stroke-dasharray="12 18"/>
              </svg>
              <article className="stop">
                <div className="num">1</div>
                <strong>Feed it the rough stuff.</strong>
                <p>Notes from a slide deck, vocabulary lists, textbook snippets, or a half-written plan all work as starting material.</p>
              </article>
              <article className="stop">
                <div className="num">2</div>
                <strong>Pick the classroom mood.</strong>
                <p>More playful? More direct? More supportive for younger readers? The draft adapts without losing the lesson goal.</p>
              </article>
              <article className="stop">
                <div className="num">3</div>
                <strong>Send, print, or save for later.</strong>
                <p>Share digitally, print a clean handout, or tuck the set into your unit library for the next class that needs it.</p>
              </article>
            </div>
          </section>

          <section className="closing">
            <div>
              <h4>Less quiz-building. More actual teaching.</h4>
              <p>QuizSprout gives busy teachers a faster first draft, kinder empty states, and a brighter rhythm for the whole week.</p>
            </div>
            <a href="#top" className="launch">Try the classroom demo</a>
          </section>

          <footer className="footer-line">
            <span>QuizSprout</span>
            <div>
              <span>Friendly by default</span>
              <span>Editable answer keys</span>
              <span>Made for busy classrooms</span>
            </div>
          </footer>
        </main>
      `;
    }

    createRoot(document.getElementById("root")).render(html`<${App} />`);
  </script>
</body>
</html>
