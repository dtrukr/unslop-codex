<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SentraIQ | AI Compliance Monitoring for Fintech Teams</title>
  <meta name="description" content="SentraIQ helps fintech risk and operations teams monitor compliance continuously with AI-powered alerting, evidence capture, policy checks, and audit-ready reporting." />
  <meta name="keywords" content="AI compliance monitoring, fintech compliance software, transaction monitoring, risk operations, audit readiness, regtech" />
  <meta property="og:title" content="SentraIQ | AI Compliance Monitoring for Fintech Teams" />
  <meta property="og:description" content="Reduce manual reviews, detect policy drift faster, and ship audit-ready evidence with AI-powered compliance monitoring." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root{
      --bg:#f4f7f5; --panel:#ffffffd9; --ink:#12211a; --muted:#5a6a63; --line:#d5dfd9;
      --brand:#0f6f52; --brand-2:#13a36f; --accent:#d9f3e8; --shadow:0 12px 40px rgba(20,38,30,.08);
      --radius:22px; --radius-sm:14px; --max:1180px;
    }
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;font-family:Manrope,sans-serif;background:
      radial-gradient(circle at 10% 10%, rgba(19,163,111,.10), transparent 28%),
      radial-gradient(circle at 90% 0%, rgba(15,111,82,.12), transparent 26%),
      linear-gradient(180deg,#f8fbf9 0%, #eef5f1 100%); color:var(--ink)}
    a{text-decoration:none;color:inherit} img{max-width:100%} button,input,select,textarea{font:inherit}
    .shell{width:min(var(--max),calc(100% - 32px));margin:0 auto}
    .topbar{position:sticky;top:0;z-index:20;background:rgba(248,251,249,.86);backdrop-filter:blur(14px);border-bottom:1px solid rgba(213,223,217,.8)}
    .nav{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
    .brand{display:flex;align-items:center;gap:12px;font-weight:800}
    .mark{width:40px;height:40px;border-radius:12px;background:linear-gradient(145deg,var(--brand),#0d4b38);display:grid;place-items:center;color:#fff;box-shadow:var(--shadow)}
    .navlinks{display:flex;gap:22px;align-items:center;color:var(--muted);font-size:15px}
    .navlinks a:hover,.navlinks button:hover{color:var(--ink)}
    .btn{border:0;border-radius:999px;padding:13px 18px;font-weight:700;cursor:pointer;transition:.25s ease;display:inline-flex;align-items:center;gap:10px}
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand-2));color:#fff;box-shadow:0 12px 28px rgba(15,111,82,.24)}
    .btn-secondary{background:#fff;border:1px solid var(--line);color:var(--ink)}
    .hero{padding:54px 0 26px;display:grid;grid-template-columns:1.15fr .85fr;gap:28px;align-items:center}
    .eyebrow,.mono{font-family:"IBM Plex Mono",monospace}
    .eyebrow{display:inline-flex;gap:8px;align-items:center;background:var(--accent);color:var(--brand);padding:8px 12px;border-radius:999px;font-size:12px}
    h1,h2,h3{line-height:1.03;margin:0} h1{font-size:clamp(42px,7vw,76px);letter-spacing:-.04em}
    h2{font-size:clamp(30px,4vw,48px);letter-spacing:-.03em} h3{font-size:22px}
    p{color:var(--muted);line-height:1.6}
    .lead{font-size:18px;max-width:660px}
    .actions,.trust{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
    .trust{margin-top:18px;color:var(--muted);font-size:14px}
    .heroCard,.panel,.stat,.price,.study,.faq,.flow,.quote{background:var(--panel);border:1px solid rgba(213,223,217,.9);backdrop-filter:blur(8px);box-shadow:var(--shadow);border-radius:var(--radius)}
    .heroCard{padding:22px;position:relative;overflow:hidden}
    .heroGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .metric{padding:16px;border-radius:18px;background:linear-gradient(180deg,#fff,#f7faf8);border:1px solid var(--line)}
    .metric strong{display:block;font-size:30px}
    .signal{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border:1px solid var(--line);border-radius:16px;margin-top:12px;background:#fff}
    .dot{width:10px;height:10px;border-radius:999px;background:#ffb020;box-shadow:0 0 0 6px rgba(255,176,32,.12)}
    .dot.ok{background:#14a36f;box-shadow:0 0 0 6px rgba(20,163,111,.12)}
    .section{padding:58px 0}
    .sectionHead{display:flex;justify-content:space-between;gap:20px;align-items:end;margin-bottom:22px}
    .grid-3,.grid-4,.pricing,.studies,.faqGrid,.solutionsGrid{display:grid;gap:18px}
    .grid-3{grid-template-columns:repeat(3,1fr)} .grid-4{grid-template-columns:repeat(4,1fr)}
    .solutionsGrid{grid-template-columns:1.1fr .9fr}.pricing{grid-template-columns:repeat(3,1fr)} .studies{grid-template-columns:repeat(3,1fr)} .faqGrid{grid-template-columns:1fr 1fr}
    .panel,.stat,.price,.study,.faq,.flow,.quote{padding:22px}
    .kpi{font-size:12px;color:var(--brand);text-transform:uppercase;letter-spacing:.08em}
    .tag{display:inline-flex;padding:7px 10px;border-radius:999px;background:#eef6f1;color:var(--brand);font-size:12px;font-weight:700}
    ul.clean{padding:0;margin:16px 0 0;list-style:none;display:grid;gap:12px}
    ul.clean li{display:flex;gap:10px;align-items:flex-start;color:var(--muted)}
    .check{width:20px;height:20px;border-radius:999px;background:var(--accent);color:var(--brand);display:grid;place-items:center;font-size:12px;font-weight:800;flex:none;margin-top:2px}
    .price.featured{background:linear-gradient(180deg,#0f6f52,#134b3a);color:#fff}.price.featured p,.price.featured li,.price.featured .kpi{color:rgba(255,255,255,.82)}
    .priceNum{font-size:44px;font-weight:800;letter-spacing:-.04em}
    .study{display:flex;flex-direction:column;gap:12px}
    .study .result{font-size:34px;font-weight:800}
    .faq button{width:100%;border:0;background:none;padding:0;text-align:left;display:flex;justify-content:space-between;gap:20px;font-weight:700;color:var(--ink);cursor:pointer}
    .faq .answer{padding-top:12px}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .formgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    input,select,textarea{width:100%;padding:14px 15px;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--ink)}
    input:focus,select:focus,textarea:focus{outline:2px solid rgba(19,163,111,.25);border-color:var(--brand-2)}
    textarea{min-height:110px;resize:vertical}
    .footer{padding:24px 0 38px;color:var(--muted);font-size:14px}
    .subtle{font-size:14px;color:var(--muted)}
    .hide-mobile{display:block}
    .mobile-menu{display:none}
    [data-animate]{opacity:0;transform:translateY(18px);transition:.7s ease}
    [data-animate].in{opacity:1;transform:none}
    @media (max-width: 980px){
      .hero,.solutionsGrid,.pricing,.studies,.faqGrid,.split,.grid-3,.grid-4,.formgrid{grid-template-columns:1fr}
      .hide-mobile{display:none}.mobile-menu{display:inline-flex}.navlinks{display:none}
      .sectionHead{align-items:start;flex-direction:column}
      .hero{padding-top:34px}
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const {useEffect, useMemo, useState} = React;

    const nav = [
      {id:"home", label:"Home"},
      {id:"solutions", label:"Solutions"},
      {id:"pricing", label:"Pricing"},
      {id:"demo", label:"Book Demo"}
    ];

    const benefits = [
      {title:"Continuous controls monitoring", text:"Track policy drift, suspicious operational patterns, and workflow exceptions in real time instead of waiting for manual reviews."},
      {title:"AI-generated evidence trails", text:"Every alert includes source records, policy rationale, analyst notes, and a clean audit package for internal and external reviews."},
      {title:"Faster escalation for ops teams", text:"Surface material issues by severity, queue owner, and regulator impact so teams spend time where exposure is highest."}
    ];

    const solutions = [
      "Transaction and merchant compliance checks across onboarding, payments, and account lifecycle events.",
      "Policy-to-alert mapping for AML, KYC, chargeback, vendor, and internal control requirements.",
      "Exception trend analysis for operations leaders who need visibility across regions, queues, and partner banks.",
      "Board-ready reporting with evidence snapshots, issue aging, SLA tracking, and remediation status."
    ];

    const pricing = [
      {name:"Starter", price:"1,900", blurb:"For teams replacing spreadsheet-based reviews.", items:["Up to 3 monitoring workflows","Daily evidence packs","10 users","Email support"]},
      {name:"Growth", price:"4,800", blurb:"For scaling fintech ops and risk functions.", items:["Unlimited workflows","Real-time alerting","SSO + approval routing","Dedicated onboarding"], featured:true},
      {name:"Enterprise", price:"Custom", blurb:"For multi-entity programs with complex controls.", items:["Custom policies and data models","Regional governance views","API and data warehouse sync","Priority support + SLA"]}
    ];

    const studies = [
      {name:"Card Issuer", result:"63%", label:"less time spent preparing audit evidence", text:"SentraIQ replaced weekly spreadsheet reconciliations with automated evidence capture across onboarding and transaction reviews."},
      {name:"Embedded Finance Platform", result:"41%", label:"faster alert resolution", text:"Risk operations triaged exceptions by severity and queue ownership, reducing backlog growth during peak volume weeks."},
      {name:"Digital Wallet", result:"3x", label:"increase in control coverage", text:"The team launched new controls without adding headcount by reusing policy templates and routing logic."}
    ];

    const faqs = [
      ["How is this different from a rules engine?", "SentraIQ does not just fire rules. It maps controls to evidence, explains why an item triggered, and packages remediation history for auditors and internal stakeholders."],
      ["Who uses the product day to day?", "Risk leaders use the executive views, operations managers run queues and workflows, and analysts investigate alerts with linked source data and policy context."],
      ["Can you work with our existing systems?", "Yes. Teams usually connect event streams, case management exports, ticketing systems, and data warehouse tables. We support phased rollouts if you need to start with one workflow."],
      ["How long does implementation take?", "Most growth-stage fintech teams launch their first monitored workflow in 2 to 4 weeks, then expand control coverage over the next quarter."],
      ["Is the site and product accessible?", "This demo website uses semantic landmarks, keyboard-friendly controls, sufficient color contrast, clear focus states, and mobile-responsive layouts. The product follows the same standard."],
      ["What happens after a demo request?", "We confirm your goals, review your current review process, and return a recommended rollout plan with sample workflows, estimated ROI, and implementation scope."]
    ];

    const useHashRoute = () => {
      const getRoute = () => (location.hash || "#home").replace("#", "");
      const [route, setRoute] = useState(getRoute());
      useEffect(() => {
        const onHash = () => setRoute(getRoute());
        window.addEventListener("hashchange", onHash);
        return () => window.removeEventListener("hashchange", onHash);
      }, []);
      return [route, (next) => { location.hash = next; setRoute(next); window.scrollTo({top:0, behavior:"smooth"}); }];
    };

    function Reveal() {
      useEffect(() => {
        const els = [...document.querySelectorAll("[data-animate]")];
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => e.isIntersecting && e.target.classList.add("in"));
        }, {threshold:.12});
        els.forEach(el => obs.observe(el));
        return () => obs.disconnect();
      }, []);
      return null;
    }

    function Header({route, setRoute}) {
      const [open, setOpen] = useState(false);
      return (
        <header className="topbar">
          <div className="shell nav" aria-label="Main navigation">
            <a href="#home" className="brand" onClick={() => setRoute("home")}>
              <span className="mark" aria-hidden="true">S</span>
              <span>SentraIQ</span>
            </a>
            <nav className="navlinks">
              {nav.map(item => <a key={item.id} href={`#${item.id}`} aria-current={route===item.id?"page":undefined}>{item.label}</a>)}
              <a href="#faq">FAQ</a>
              <button className="btn btn-primary" onClick={() => setRoute("demo")}>Request Demo</button>
            </nav>
            <button className="btn btn-secondary mobile-menu" aria-expanded={open} onClick={() => setOpen(!open)}>Menu</button>
          </div>
          {open && (
            <div className="shell" style={{paddingBottom:14}}>
              <div className="panel" style={{display:"grid", gap:10}}>
                {nav.map(item => <a key={item.id} href={`#${item.id}`} onClick={() => {setOpen(false); setRoute(item.id);}}>{item.label}</a>)}
                <a href="#faq" onClick={() => setOpen(false)}>FAQ</a>
              </div>
            </div>
          )}
        </header>
      );
    }

    function Hero({setRoute}) {
      return (
        <section className="shell hero" aria-labelledby="hero-title">
          <div data-animate>
            <div className="eyebrow"><span>AI Compliance Monitoring</span><span>•</span><span>Built for Fintech</span></div>
            <div style={{height:16}} />
            <h1 id="hero-title">Catch control failures before they become regulatory exposure.</h1>
            <p className="lead">SentraIQ gives fintech risk and operations teams continuous visibility into compliance exceptions, policy drift, and remediation progress, with AI-generated evidence ready for audits and board reporting.</p>
            <div className="actions">
              <button className="btn btn-primary" onClick={() => setRoute("demo")}>See a tailored demo</button>
              <a className="btn btn-secondary" href="#pricing">View pricing</a>
            </div>
            <div className="trust">
              <span>Trusted by payments, wallet, lending, and embedded finance teams.</span>
              <span className="mono">SOC-ready workflows • API-first • Human review in the loop</span>
            </div>
          </div>
          <div className="heroCard" data-animate>
            <div className="heroGrid">
              <div className="metric">
                <span className="kpi">Alert prioritization</span>
                <strong>92%</strong>
                <p>of high-risk exceptions surfaced within SLA using severity-aware routing.</p>
              </div>
              <div className="metric">
                <span className="kpi">Evidence prep</span>
                <strong>8 hrs</strong>
                <p>saved per audit sample by linking controls, notes, and source records.</p>
              </div>
            </div>
            <div className="signal"><div><strong>Policy Drift Detected</strong><div className="subtle">Merchant onboarding checks skipped in new partner flow</div></div><span className="dot" /></div>
            <div className="signal"><div><strong>Remediation Complete</strong><div className="subtle">Control owner updated thresholds and backfilled evidence</div></div><span className="dot ok" /></div>
            <div className="signal"><div><strong>Audit Package Ready</strong><div className="subtle">18 linked records, 3 approvals, 1 executive summary exported</div></div><span className="dot ok" /></div>
          </div>
        </section>
      );
    }

    function Home({setRoute}) {
      return (
        <>
          <Hero setRoute={setRoute} />
          <section className="section">
            <div className="shell">
              <div className="sectionHead" data-animate>
                <div><span className="tag">Why teams switch</span><h2 style={{marginTop:12}}>A compliance command layer for fast-moving fintech operations.</h2></div>
                <p style={{maxWidth:460}}>Built for leaders balancing regulatory pressure, partner scrutiny, and lean teams that cannot afford manual blind spots.</p>
              </div>
              <div className="grid-3">
                {benefits.map((b, i) => <article key={i} className="panel" data-animate><h3>{b.title}</h3><p>{b.text}</p></article>)}
              </div>
            </div>
          </section>

          <section className="section" id="case-studies">
            <div className="shell">
              <div className="sectionHead" data-animate>
                <div><span className="tag">Case Study Highlights</span><h2 style={{marginTop:12}}>Clear ROI for risk and operations leaders.</h2></div>
                <p style={{maxWidth:470}}>Conversion-focused proof points that speak to efficiency, control coverage, and audit readiness.</p>
              </div>
              <div className="studies">
                {studies.map((s, i) => (
                  <article key={i} className="study" data-animate>
                    <div className="kpi">{s.name}</div>
                    <div className="result">{s.result}</div>
                    <strong>{s.label}</strong>
                    <p>{s.text}</p>
                  </article>
                ))}
              </div>
            </div>
          </section>
        </>
      );
    }

    function Solutions() {
      return (
        <section className="section">
          <div className="shell solutionsGrid">
            <div data-animate>
              <span className="tag">Solutions</span>
              <h2 style={{marginTop:12}}>Designed for the workflows where compliance breaks down in practice.</h2>
              <p className="lead">SentraIQ unifies policy monitoring, exception management, and reporting so your team can move from reactive cleanup to continuous assurance.</p>
              <ul className="clean">
                {solutions.map((item, i) => <li key={i}><span className="check">✓</span><span>{item}</span></li>)}
              </ul>
            </div>
            <div className="split" data-animate>
              <div className="stat">
                <div className="kpi">For Chief Risk Officers</div>
                <h3>See exposure early</h3>
                <p>Get a portfolio view of issue aging, breached controls, and remediation progress across products, geographies, and partners.</p>
              </div>
              <div className="stat">
                <div className="kpi">For Operations Leaders</div>
                <h3>Reduce manual rework</h3>
                <p>Route exceptions by risk, auto-attach evidence, and keep analysts focused on investigations instead of documentation overhead.</p>
              </div>
              <div className="stat">
                <div className="kpi">For Compliance Teams</div>
                <h3>Defend your process</h3>
                <p>Maintain a record of what triggered, who reviewed, what changed, and how remediation was closed with minimal friction.</p>
              </div>
              <div className="quote">
                <div className="kpi">Customer voice</div>
                <p style={{fontSize:20,color:"var(--ink)",fontWeight:700}}>“We stopped preparing for audits in bursts. Now we are always ready.”</p>
                <p className="subtle">VP Risk Operations, growth-stage payments company</p>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function Pricing({setRoute}) {
      return (
        <section className="section">
          <div className="shell">
            <div className="sectionHead" data-animate>
              <div><span className="tag">Pricing</span><h2 style={{marginTop:12}}>Pricing that scales with control complexity, not seat sprawl.</h2></div>
              <p style={{maxWidth:450}}>Start with a single workflow, then expand into enterprise governance as your regulatory footprint grows.</p>
            </div>
            <div className="pricing">
              {pricing.map((p, i) => (
                <article key={i} className={`price ${p.featured ? "featured" : ""}`} data-animate>
                  <div className="kpi">{p.name}</div>
                  <div style={{margin:"8px 0 4px"}} className="priceNum">{p.price === "Custom" ? p.price : `$${p.price}`}</div>
                  <p>{p.price === "Custom" ? "Tailored to your environment" : "per month"} • {p.blurb}</p>
                  <ul className="clean">{p.items.map((it, x) => <li key={x}><span className="check">✓</span><span>{it}</span></li>)}</ul>
                  <div style={{marginTop:18}}><button className={`btn ${p.featured ? "btn-secondary" : "btn-primary"}`} onClick={() => setRoute("demo")}>Request pricing walkthrough</button></div>
                </article>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function FAQ() {
      const [open, setOpen] = useState(0);
      return (
        <section className="section" id="faq">
          <div className="shell">
            <div className="sectionHead" data-animate>
              <div><span className="tag">FAQ</span><h2 style={{marginTop:12}}>Questions from risk, ops, and compliance buyers.</h2></div>
            </div>
            <div className="faqGrid">
              {faqs.map(([q,a], i) => (
                <article className="faq" key={i} data-animate>
                  <button aria-expanded={open===i} onClick={() => setOpen(open===i ? -1 : i)}>
                    <span>{q}</span><span aria-hidden="true">{open===i ? "−" : "+"}</span>
                  </button>
                  {open===i && <div className="answer"><p>{a}</p></div>}
                </article>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Demo() {
      const [sent, setSent] = useState(false);
      return (
        <section className="section">
          <div className="shell split">
            <div data-animate>
              <span className="tag">Request a Demo</span>
              <h2 style={{marginTop:12}}>Get a tailored walkthrough of your highest-risk workflows.</h2>
              <p className="lead">Share your current review process, where evidence preparation is slow, and which controls are hardest to monitor. We will map a rollout plan that speaks to risk reduction and team efficiency.</p>
              <ul className="clean">
                <li><span className="check">1</span><span>30-minute discovery with a fintech compliance specialist</span></li>
                <li><span className="check">2</span><span>Example workflow design aligned to your operating model</span></li>
                <li><span className="check">3</span><span>ROI estimate for audit prep, queue load, and control coverage</span></li>
              </ul>
            </div>
            <div className="flow" data-animate>
              {!sent ? (
                <form onSubmit={(e)=>{e.preventDefault(); setSent(true);}} aria-label="Demo request form">
                  <div className="formgrid">
                    <input required aria-label="Full name" placeholder="Full name" />
                    <input required type="email" aria-label="Work email" placeholder="Work email" />
                    <input required aria-label="Company" placeholder="Company" />
                    <select aria-label="Team size default" defaultValue="">
                      <option value="" disabled>Team size</option>
                      <option>1-10</option><option>11-50</option><option>51-200</option><option>200+</option>
                    </select>
                  </div>
                  <div style={{height:14}} />
                  <select aria-label="Primary goal" defaultValue="">
                    <option value="" disabled>Primary goal</option>
                    <option>Reduce audit prep time</option>
                    <option>Improve control coverage</option>
                    <option>Speed up exception handling</option>
                    <option>Standardize reporting</option>
                  </select>
                  <div style={{height:14}} />
                  <textarea aria-label="What is breaking today" placeholder="What is breaking today? Example: onboarding exceptions are reviewed manually, evidence is scattered across tools, and quarterly audits create backlog spikes." />
                  <div style={{height:16}} />
                  <button className="btn btn-primary" type="submit">Request Demo</button>
                  <p className="subtle">By submitting, you agree to be contacted about your request. No spam. No generic product tour.</p>
                </form>
              ) : (
                <div>
                  <div className="eyebrow">Request received</div>
                  <h3 style={{marginTop:14}}>Your demo request is in queue.</h3>
                  <p>Expect a follow-up with proposed times, a discovery agenda, and a sample workflow relevant to fintech risk and operations teams.</p>
                  <a className="btn btn-secondary" href="#home">Return to homepage</a>
                </div>
              )}
            </div>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer className="footer">
          <div className="shell" style={{display:"flex",justifyContent:"space-between",gap:18,flexWrap:"wrap"}}>
            <div><strong>SentraIQ</strong><div>AI-powered compliance monitoring for fintech teams.</div></div>
            <div>© 2026 SentraIQ. Built for audit readiness, operational clarity, and faster decisions.</div>
          </div>
        </footer>
      );
    }

    function App() {
      const [route, setRoute] = useHashRoute();
      const page = useMemo(() => {
        if (route === "solutions") return <Solutions />;
        if (route === "pricing") return <Pricing setRoute={setRoute} />;
        if (route === "demo") return <Demo />;
        return <Home setRoute={setRoute} />;
      }, [route]);

      return (
        <>
          <Reveal />
          <Header route={route} setRoute={setRoute} />
          <main>
            {page}
            {route !== "pricing" && <Pricing setRoute={setRoute} />}
            {route !== "solutions" && <Solutions />}
            <FAQ />
            {route !== "demo" && <Demo />}
          </main>
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
