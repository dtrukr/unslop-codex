<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Northline Supply</title>
  <style>
    :root {
      --night: #182127;
      --basalt: #27343d;
      --stone: #d8ccb8;
      --sand: #bca487;
      --rust: #bb5c38;
      --clay: #8b3f2a;
      --lichen: #6c7561;
      --fog: #f0e6d8;
      --water: #7f9ca0;
      --line: rgba(24, 33, 39, 0.14);
      --max: 1340px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: auto; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        linear-gradient(180deg, #d5c6af 0 28rem, #f0e6d8 28rem 58rem, #d8ccb8 58rem 100%);
      color: var(--night);
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    #root { min-height: 100vh; }

    .page {
      width: min(calc(100% - 28px), var(--max));
      margin: 0 auto;
      padding-bottom: 40px;
    }

    .topline {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 14px 28px;
      padding: 18px 0 10px;
      border-bottom: 1px solid rgba(24, 33, 39, 0.18);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .wordmark {
      display: inline-flex;
      align-items: baseline;
      gap: 10px;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      letter-spacing: 0.03em;
      font-size: 1.2rem;
    }

    .wordmark span:last-child {
      color: var(--clay);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      letter-spacing: 0.18em;
    }

    .navlinks {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 18px;
      align-items: center;
    }

    .navlinks a {
      opacity: 0.82;
    }

    .masthead {
      display: grid;
      gap: 0;
      padding: 16px 0 0;
    }

    .hero-board {
      background: linear-gradient(145deg, rgba(24,33,39,0.98), rgba(39,52,61,0.94));
      color: var(--fog);
      padding: 18px;
      display: grid;
      gap: 18px;
      overflow: hidden;
    }

    .hero-top {
      display: grid;
      gap: 20px;
    }

    .route-note {
      display: inline-block;
      width: fit-content;
      padding: 6px 0;
      border-bottom: 2px solid rgba(240, 230, 216, 0.35);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .hero-copy {
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .hero-copy h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 6.5rem);
      line-height: 0.92;
      text-transform: uppercase;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      letter-spacing: 0.03em;
      max-width: 10ch;
    }

    .hero-copy p {
      margin: 0;
      max-width: 34rem;
      font-size: 1.05rem;
      line-height: 1.6;
      color: rgba(240,230,216,0.88);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .action {
      border: 1px solid rgba(240,230,216,0.24);
      padding: 14px 18px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.92rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: transparent;
      color: var(--fog);
      transition: 180ms ease;
    }

    .action.hot {
      background: var(--rust);
      border-color: var(--rust);
      color: #fff6ef;
    }

    .action:hover {
      transform: translateY(-2px);
      background: rgba(240,230,216,0.08);
    }

    .action.hot:hover {
      background: #cf6b45;
    }

    .hero-side {
      background: linear-gradient(180deg, rgba(188,164,135,0.95), rgba(139,63,42,0.95));
      color: #fff4ea;
      padding: 18px;
      display: grid;
      gap: 20px;
      align-content: space-between;
      min-height: 240px;
    }

    .kit-list {
      display: grid;
      gap: 12px;
      font-family: Arial, Helvetica, sans-serif;
    }

    .kit-item {
      display: grid;
      grid-template-columns: 54px 1fr;
      gap: 14px;
      align-items: start;
      border-top: 1px solid rgba(255,244,234,0.24);
      padding-top: 12px;
    }

    .kit-item:first-child { border-top: 0; padding-top: 0; }

    .kit-num {
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .kit-copy strong {
      display: block;
      margin-bottom: 4px;
      font-size: 1rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .kit-copy span {
      display: block;
      line-height: 1.5;
      font-size: 0.95rem;
      color: rgba(255,244,234,0.86);
    }

    .measure-band {
      display: grid;
      gap: 1px;
      background: rgba(24,33,39,0.18);
      margin-top: 1px;
    }

    .measure-band > div {
      background: rgba(240,230,216,0.72);
      padding: 16px 18px;
      display: grid;
      gap: 4px;
    }

    .measure-band strong {
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: 2rem;
      letter-spacing: 0.04em;
      color: var(--clay);
    }

    .measure-band span {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.82rem;
      line-height: 1.45;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .story-layout,
    .about-layout {
      display: grid;
      gap: 1px;
      background: rgba(24,33,39,0.14);
      margin-top: 18px;
    }

    .story-panel,
    .about-panel,
    .review-strip,
    .signup-panel {
      background: var(--fog);
      padding: 22px 18px;
    }

    .section-title {
      margin: 0 0 14px;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: clamp(2rem, 6vw, 3.8rem);
      line-height: 0.96;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      max-width: 10ch;
    }

    .story-lead {
      font-size: 1.08rem;
      line-height: 1.7;
      max-width: 48rem;
      margin: 0;
    }

    .trace {
      display: grid;
      gap: 10px;
      margin-top: 22px;
      font-family: Arial, Helvetica, sans-serif;
    }

    .trace div {
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 12px;
      align-items: start;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .trace strong {
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 12px;
      color: var(--clay);
    }

    .trace span {
      line-height: 1.55;
      color: rgba(24,33,39,0.8);
    }

    .story-aside {
      background: var(--night);
      color: var(--fog);
      padding: 22px 18px;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .material-grid {
      display: grid;
      gap: 1px;
      background: rgba(240,230,216,0.16);
    }

    .material-grid div {
      background: rgba(255,255,255,0.04);
      padding: 16px 14px;
    }

    .material-grid strong,
    .collection-rail strong,
    .about-preview strong {
      display: block;
      margin-bottom: 6px;
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 11px;
    }

    .material-grid p,
    .collection-rail p,
    .about-preview p {
      margin: 0;
      line-height: 1.55;
      color: inherit;
    }

    .collections-wrap {
      margin-top: 18px;
      display: grid;
      gap: 1px;
      background: rgba(24,33,39,0.14);
    }

    .collection-row {
      background: var(--stone);
      padding: 0;
      display: grid;
      gap: 1px;
    }

    .collection-rail {
      padding: 20px 18px;
      background: rgba(240,230,216,0.6);
    }

    .collection-body {
      padding: 24px 18px;
      background: var(--fog);
      display: grid;
      gap: 12px;
    }

    .collection-body h3 {
      margin: 0;
      font-size: clamp(1.5rem, 5vw, 2.6rem);
      line-height: 1;
      text-transform: uppercase;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      letter-spacing: 0.03em;
    }

    .collection-body p {
      margin: 0;
      max-width: 42rem;
      line-height: 1.65;
    }

    .collection-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(24,33,39,0.72);
    }

    .review-block {
      margin-top: 18px;
      display: grid;
      gap: 1px;
      background: rgba(24,33,39,0.16);
    }

    .review-strip {
      background: linear-gradient(90deg, rgba(127,156,160,0.24), rgba(240,230,216,0.95));
      display: grid;
      gap: 8px;
    }

    .review-strip:nth-child(2) {
      background: linear-gradient(90deg, rgba(188,92,56,0.22), rgba(240,230,216,0.95));
    }

    .review-strip:nth-child(3) {
      background: linear-gradient(90deg, rgba(108,117,97,0.24), rgba(240,230,216,0.95));
    }

    .review-text {
      font-size: 1.28rem;
      line-height: 1.5;
      margin: 0;
    }

    .review-byline {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.84rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(24,33,39,0.7);
    }

    .signup-grid {
      margin-top: 18px;
      display: grid;
      gap: 1px;
      background: rgba(24,33,39,0.16);
    }

    .signup-panel {
      background: var(--night);
      color: var(--fog);
    }

    .signup-panel p {
      margin: 0 0 18px;
      max-width: 34rem;
      line-height: 1.7;
      color: rgba(240,230,216,0.84);
    }

    .fieldrow {
      display: grid;
      gap: 10px;
    }

    .fieldrow input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(240,230,216,0.26);
      background: transparent;
      color: var(--fog);
      font-size: 1rem;
    }

    .fieldrow input::placeholder { color: rgba(240,230,216,0.46); }

    .fieldrow button {
      padding: 14px 16px;
      border: 0;
      background: var(--rust);
      color: #fff7ef;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .signup-note {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(240,230,216,0.6);
    }

    .about-panel {
      background: rgba(240,230,216,0.92);
    }

    .about-preview {
      display: grid;
      gap: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .about-preview:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .footer {
      margin-top: 18px;
      border-top: 1px solid rgba(24,33,39,0.18);
      padding: 18px 0 12px;
      display: grid;
      gap: 14px;
      font-family: Arial, Helvetica, sans-serif;
    }

    .footer-grid {
      display: grid;
      gap: 12px;
    }

    .footer small {
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(24,33,39,0.62);
    }

    @media (min-width: 700px) {
      .hero-board {
        grid-template-columns: 1.35fr 0.9fr;
        align-items: stretch;
      }

      .measure-band {
        grid-template-columns: repeat(3, 1fr);
      }

      .story-layout,
      .about-layout,
      .signup-grid {
        grid-template-columns: 1.15fr 0.85fr;
      }

      .fieldrow {
        grid-template-columns: 1.3fr auto;
        align-items: end;
      }

      .collection-row {
        grid-template-columns: 0.72fr 1.28fr;
      }

      .footer-grid {
        grid-template-columns: 1.2fr 0.8fr 0.8fr;
      }
    }

    @media (min-width: 980px) {
      .page {
        width: min(calc(100% - 44px), var(--max));
      }

      .hero-board,
      .story-panel,
      .story-aside,
      .collection-body,
      .collection-rail,
      .review-strip,
      .signup-panel,
      .about-panel {
        padding: 28px;
      }

      .hero-top {
        grid-template-columns: 1.1fr 0.9fr;
        align-items: end;
      }

      .hero-side { min-height: auto; }
    }
  </style>
</head>
