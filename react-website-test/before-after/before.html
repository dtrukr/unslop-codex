<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Northline Supply</title>
  <meta name="description" content="Northline Supply creates eco-friendly travel gear for a new generation of outdoor-minded explorers." />
  <style>
    :root {
      --sand: #efe6d2;
      --clay: #c97a4d;
      --moss: #4f6a4d;
      --forest: #203328;
      --pine: #2d4735;
      --cream: #faf6ef;
      --stone: #7c7267;
      --sun: #e6b85c;
      --white: #fffdf9;
      --shadow: 0 18px 50px rgba(32, 51, 40, 0.12);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, var(--cream), #f3ecd9 45%, #e9dfc8 100%);
      color: var(--forest);
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .page {
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .page::before,
    .page::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
      filter: blur(20px);
      opacity: 0.35;
    }

    .page::before {
      width: 320px;
      height: 320px;
      background: rgba(230, 184, 92, 0.25);
      top: -100px;
      right: -80px;
    }

    .page::after {
      width: 280px;
      height: 280px;
      background: rgba(79, 106, 77, 0.16);
      left: -90px;
      top: 340px;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0;
    }

    .brand {
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .brand span { color: var(--clay); }

    .nav-links {
      display: none;
      gap: 20px;
      color: var(--pine);
      font-weight: 700;
      font-size: 0.95rem;
    }

    .cta-link {
      background: var(--forest);
      color: var(--white);
      padding: 11px 16px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 0.92rem;
      box-shadow: var(--shadow);
    }

    .hero {
      display: grid;
      gap: 20px;
      padding: 24px 0 28px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 253, 249, 0.75);
      border: 1px solid rgba(32, 51, 40, 0.08);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--moss);
    }

    h1, h2, h3 {
      margin: 0;
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.04em;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(3rem, 11vw, 6.4rem);
      max-width: 10ch;
    }

    h2 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      max-width: 12ch;
    }

    h3 {
      font-size: 1.2rem;
      line-height: 1;
    }

    .lead,
    .section-copy,
    .card-copy,
    .review-copy,
    .signup-copy,
    .about-copy {
      color: var(--pine);
      line-height: 1.6;
      font-size: 1rem;
    }

    .lead {
      max-width: 36rem;
      font-size: 1.08rem;
      margin-top: 16px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 900;
      letter-spacing: 0.02em;
      font-size: 0.96rem;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--forest);
      color: var(--white);
      box-shadow: var(--shadow);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.6);
      color: var(--forest);
      border: 1px solid rgba(32, 51, 40, 0.12);
    }

    .hero-grid {
      display: grid;
      gap: 16px;
      margin-top: 16px;
    }

    .hero-card,
    .story-card,
    .collection-card,
    .review-card,
    .signup-card,
    .about-card {
      border-radius: var(--radius);
      background: rgba(255, 253, 249, 0.78);
      border: 1px solid rgba(32, 51, 40, 0.08);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero-visual {
      padding: 18px;
      min-height: 340px;
      background:
        radial-gradient(circle at 70% 15%, rgba(230, 184, 92, 0.45), transparent 26%),
        linear-gradient(145deg, #5a7254 0%, #304b39 46%, #203328 100%);
      color: var(--white);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .altitude {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      font-weight: 700;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .gear-stack {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      align-items: end;
    }

    .gear {
      border-radius: 20px 20px 12px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.26), rgba(255,255,255,0.08));
      border: 1px solid rgba(255,255,255,0.18);
      min-height: 130px;
      position: relative;
      overflow: hidden;
    }

    .gear:nth-child(2) { min-height: 170px; }
    .gear:nth-child(3) { min-height: 145px; }

    .gear::after {
      content: "";
      position: absolute;
      inset: auto 14px 14px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.25);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .stat {
      padding: 16px;
      background: var(--sand);
      border-radius: 18px;
    }

    .stat strong {
      display: block;
      font-size: 1.8rem;
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 6px;
    }

    .section {
      padding: 26px 0;
    }

    .section-head {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    .story-card {
      display: grid;
      gap: 18px;
      padding: 20px;
    }

    .story-steps {
      display: grid;
      gap: 12px;
    }

    .step {
      padding: 16px;
      background: var(--sand);
      border-radius: 18px;
    }

    .step-tag {
      display: inline-block;
      margin-bottom: 8px;
      color: var(--clay);
      font-size: 0.8rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .collections,
    .reviews {
      display: grid;
      gap: 16px;
    }

    .collection-card,
    .review-card,
    .signup-card,
    .about-card {
      padding: 18px;
    }

    .collection-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .pill {
      display: inline-flex;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(79, 106, 77, 0.12);
      color: var(--moss);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .swatch {
      height: 170px;
      border-radius: 18px;
      margin-bottom: 16px;
      background-size: cover;
      background-position: center;
    }

    .swatch-pack {
      background:
        linear-gradient(160deg, rgba(239,230,210,0.25), transparent),
        linear-gradient(135deg, #516a4d, #23362c);
    }

    .swatch-camp {
      background:
        radial-gradient(circle at 20% 25%, rgba(230,184,92,0.45), transparent 25%),
        linear-gradient(135deg, #7a5f43, #423127);
    }

    .swatch-trail {
      background:
        linear-gradient(135deg, rgba(255,255,255,0.12), transparent),
        linear-gradient(135deg, #4d6c5f, #8a6942);
    }

    .price {
      color: var(--clay);
      font-weight: 900;
      margin-top: 10px;
      font-size: 1.05rem;
    }

    .review-card {
      background: linear-gradient(180deg, rgba(255,253,249,0.92), rgba(239,230,210,0.75));
    }

    .stars {
      color: var(--sun);
      letter-spacing: 0.15em;
      font-size: 1rem;
      margin-bottom: 12px;
    }

    .review-meta {
      margin-top: 14px;
      color: var(--stone);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .signup-card {
      background: linear-gradient(135deg, var(--forest), var(--pine));
      color: var(--white);
    }

    .signup-copy {
      color: rgba(255,255,255,0.84);
      margin: 12px 0 18px;
    }

    .signup-form {
      display: grid;
      gap: 10px;
    }

    .input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.1);
      color: var(--white);
      border-radius: 999px;
      padding: 14px 16px;
      font-size: 1rem;
      outline: none;
    }

    .input::placeholder { color: rgba(255,255,255,0.65); }

    .form-note {
      margin-top: 10px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.7);
    }

    .about-card {
      display: grid;
      gap: 12px;
      background: linear-gradient(180deg, rgba(255,253,249,0.85), rgba(239,230,210,0.88));
    }

    .about-preview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .about-block {
      min-height: 110px;
      border-radius: 16px;
      padding: 14px;
      display: flex;
      align-items: end;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .about-block:first-child {
      background: linear-gradient(160deg, #d7a16f, #6d4d37);
      color: var(--white);
    }

    .about-block:last-child {
      background: linear-gradient(160deg, #5d7959, #2d4735);
      color: var(--white);
    }

    footer {
      padding: 26px 0 40px;
      color: var(--stone);
      font-size: 0.92rem;
    }

    .footer-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-top: 1px solid rgba(32, 51, 40, 0.08);
      padding-top: 18px;
    }

    @media (min-width: 760px) {
      .nav-links { display: flex; }
      .hero { grid-template-columns: 1.1fr 0.9fr; align-items: center; padding: 42px 0 36px; }
      .hero-grid { margin-top: 0; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .story-card { grid-template-columns: 0.95fr 1.05fr; padding: 26px; }
      .collections { grid-template-columns: repeat(3, 1fr); }
      .reviews { grid-template-columns: repeat(3, 1fr); }
      .signup-card { display: grid; grid-template-columns: 1fr 0.95fr; gap: 22px; align-items: center; }
      .signup-form { grid-template-columns: 1fr auto; align-items: start; }
      .footer-row { flex-direction: row; justify-content: space-between; align-items: center; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

        React.createElement("div", { className: "shell" },

                ),
                React.createElement("div", { className: "stats" },

                    className: "signup-form",
                    onSubmit: function(e) {

                    className: "input",
                    type: "email",

</body>
